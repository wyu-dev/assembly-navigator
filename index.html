<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Assembly Point Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff2d2d;
    --orange: #ff6a00;
    --yellow: #ffd600;
    --dark: #0a0a0a;
    --dark2: #111;
    --dark3: #1a1a1a;
    --text: #f0f0f0;
    --muted: #888;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,45,45,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,45,45,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header {
    width: 100%;
    padding: 16px 20px 10px;
    text-align: center;
    border-bottom: 1px solid #222;
    position: relative;
    z-index: 2;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .fire-icon { font-size: 1.4rem; animation: flicker 1.2s infinite alternate; }
  @keyframes flicker {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0.7; transform: scale(1.1); }
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* Main content */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
  }

  /* Status bar */
  #status-bar {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
    min-height: 1.2em;
    transition: color 0.3s;
  }
  #status-bar.ok { color: #00e676; }
  #status-bar.warn { color: var(--orange); }
  #status-bar.err { color: var(--red); }

  /* Compass ring */
  .compass-wrap {
    position: relative;
    width: 280px;
    height: 280px;
  }

  .ring-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid #2a2a2a;
    background: radial-gradient(circle at 30% 30%, #1e1e1e, #0d0d0d);
    box-shadow:
      0 0 0 1px #333,
      inset 0 0 40px rgba(0,0,0,0.8),
      0 4px 30px rgba(255,45,45,0.12);
  }

  /* Cardinal ticks */
  .ticks {
    position: absolute;
    inset: 12px;
    border-radius: 50%;
  }

  .tick {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
  }
  .tick::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 8px;
    background: #333;
  }
  .tick.major::before { height: 14px; width: 2px; background: #555; }

  /* Generate ticks via CSS (every 30deg) */
  .tick:nth-child(1)  { transform: rotate(0deg); }
  .tick:nth-child(2)  { transform: rotate(30deg); }
  .tick:nth-child(3)  { transform: rotate(60deg); }
  .tick:nth-child(4)  { transform: rotate(90deg); }
  .tick:nth-child(5)  { transform: rotate(120deg); }
  .tick:nth-child(6)  { transform: rotate(150deg); }
  .tick:nth-child(7)  { transform: rotate(180deg); }
  .tick:nth-child(8)  { transform: rotate(210deg); }
  .tick:nth-child(9)  { transform: rotate(240deg); }
  .tick:nth-child(10) { transform: rotate(270deg); }
  .tick:nth-child(11) { transform: rotate(300deg); }
  .tick:nth-child(12) { transform: rotate(330deg); }

  /* Arrow container — rotates */
  #arrow-container {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .arrow-svg {
    width: 130px;
    height: 130px;
    filter: drop-shadow(0 0 12px rgba(255,45,45,0.7));
  }

  /* Pulse ring */
  .pulse-ring {
    position: absolute;
    inset: 30px;
    border-radius: 50%;
    border: 1px solid rgba(255,45,45,0.15);
    animation: pulse 2s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.7s; }
  .pulse-ring:nth-child(3) { animation-delay: 1.4s; }

  @keyframes pulse {
    0%   { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  /* Center dot */
  .center-dot {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    z-index: 3;
  }

  /* Info cards */
  .info-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .info-card {
    flex: 1;
    background: var(--dark3);
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 12px 14px;
    text-align: center;
  }

  .info-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .info-value.highlight { color: var(--yellow); }
  .info-value span { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

  /* Destination card */
  .dest-card {
    width: 100%;
    background: linear-gradient(135deg, #1a0a0a, #120808);
    border: 1px solid rgba(255,45,45,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .dest-icon { font-size: 1.5rem; }

  .dest-info { flex: 1; }
  .dest-name { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .dest-coords {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .arrived-badge {
    display: none;
    background: #00e676;
    color: #000;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .arrived-badge.show { display: block; }

  /* Arrived overlay */
  #arrived-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 230, 118, 0.08);
    z-index: 10;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.5s ease;
  }
  #arrived-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .arrived-big { font-size: 4rem; font-weight: 700; color: #00e676; letter-spacing: 4px; text-align: center; }
  .arrived-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: #00e676; letter-spacing: 3px; }

  /* Permission button */
  #btn-start {
    padding: 14px 32px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: none;
  }
  #btn-start:hover { background: #cc0000; }
  #btn-start:active { transform: scale(0.97); }

  /* No compass fallback */
  #no-compass {
    display: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--orange);
    text-align: center;
    padding: 8px 16px;
    border: 1px solid rgba(255,106,0,0.3);
    border-radius: 6px;
    background: rgba(255,106,0,0.05);
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <span class="fire-icon">🔥</span>
    <h1>Assembly Point</h1>
    <span class="fire-icon">🔥</span>
  </div>
  <div class="subtitle">ADTEC JTM KUANTAN &nbsp;·&nbsp; EVACUATION NAVIGATOR</div>
</header>

<main>
  <div id="status-bar">MEMULAKAN SISTEM...</div>

  <div class="compass-wrap">
    <div class="ring-outer"></div>
    <div class="ticks">
      <div class="tick major"></div><div class="tick"></div><div class="tick major"></div>
      <div class="tick"></div><div class="tick major"></div><div class="tick"></div>
      <div class="tick major"></div><div class="tick"></div><div class="tick major"></div>
      <div class="tick"></div><div class="tick major"></div><div class="tick"></div>
    </div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div id="arrow-container">
      <!-- Arrow SVG -->
      <svg class="arrow-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Tail -->
        <rect x="44" y="55" width="12" height="28" rx="3" fill="#cc1111" opacity="0.7"/>
        <!-- Arrow head -->
        <polygon points="50,8 78,58 50,46 22,58" fill="#ff2d2d"/>
        <!-- Glow -->
        <polygon points="50,8 78,58 50,46 22,58" fill="url(#arrowGlow)" opacity="0.5"/>
        <defs>
          <radialGradient id="arrowGlow" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#ff8080"/>
            <stop offset="100%" stop-color="#ff2d2d" stop-opacity="0"/>
          </radialGradient>
        </defs>
      </svg>
    </div>
    <div class="center-dot"></div>
  </div>

  <div id="no-compass">⚠ Kompas tidak tersedia — arrow menunjukkan arah berdasarkan GPS sahaja</div>

  <div class="info-row">
    <div class="info-card">
      <div class="info-label">Jarak</div>
      <div class="info-value highlight" id="distance">--<span>m</span></div>
    </div>
    <div class="info-card">
      <div class="info-label">Bearing</div>
      <div class="info-value" id="bearing">--<span>°</span></div>
    </div>
    <div class="info-card">
      <div class="info-label">GPS</div>
      <div class="info-value" id="gps-acc" style="font-size:1.1rem">--</div>
    </div>
  </div>

  <div class="dest-card">
    <div class="dest-icon">📍</div>
    <div class="dest-info">
      <div class="dest-name">Padang ADTEC Kuantan</div>
      <div class="dest-coords">3.966437, 103.373426</div>
    </div>
    <div class="arrived-badge" id="arrived-badge">SAMPAI</div>
  </div>

  <button id="btn-start" onclick="requestPermissions()">BENARKAN LOKASI & KOMPAS</button>
</main>

<div id="arrived-overlay">
  <div class="arrived-big">✓ SAMPAI</div>
  <div class="arrived-sub">ANDA TELAH TIBA DI TEMPAT BERKUMPUL</div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const ASSEMBLY = { lat: 3.966437, lng: 103.373426 };
  const ARRIVED_THRESHOLD = 15; // meter

  // ── STATE ────────────────────────────────────────────────
  let userLat = null, userLng = null;
  let compassHeading = null;   // dari DeviceOrientation (derajat dari North)
  let hasCompass = false;
  let arrived = false;

  // ── ELEMENTS ─────────────────────────────────────────────
  const arrowEl     = document.getElementById('arrow-container');
  const distEl      = document.getElementById('distance');
  const bearingEl   = document.getElementById('bearing');
  const gpsEl       = document.getElementById('gps-acc');
  const statusEl    = document.getElementById('status-bar');
  const btnStart    = document.getElementById('btn-start');
  const noCompass   = document.getElementById('no-compass');
  const arrivedBadge   = document.getElementById('arrived-badge');
  const arrivedOverlay = document.getElementById('arrived-overlay');

  // ── HAVERSINE ─────────────────────────────────────────────
  function toRad(d) { return d * Math.PI / 180; }

  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function calcBearing(lat1, lng1, lat2, lng2) {
    const dLng = toRad(lng2 - lng1);
    const y = Math.sin(dLng) * Math.cos(toRad(lat2));
    const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
              Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  // ── UPDATE UI ─────────────────────────────────────────────
  function updateUI() {
    if (userLat === null) return;

    const dist    = haversine(userLat, userLng, ASSEMBLY.lat, ASSEMBLY.lng);
    const bearing = calcBearing(userLat, userLng, ASSEMBLY.lat, ASSEMBLY.lng);

    // Distance
    distEl.innerHTML = dist < 1000
      ? `${Math.round(dist)}<span>m</span>`
      : `${(dist/1000).toFixed(1)}<span>km</span>`;

    bearingEl.innerHTML = `${Math.round(bearing)}<span>°</span>`;

    // Rotate arrow
    let arrowAngle;
    if (hasCompass && compassHeading !== null) {
      // Arrow = bearing - compass heading (relative to screen up)
      arrowAngle = bearing - compassHeading;
    } else {
      // Fallback: just show absolute bearing (no rotation compensation)
      arrowAngle = bearing;
    }

    arrowEl.style.transform = `rotate(${arrowAngle}deg)`;

    // Arrived check
    if (dist <= ARRIVED_THRESHOLD && !arrived) {
      arrived = true;
      arrivedBadge.classList.add('show');
      arrivedOverlay.classList.add('show');
      if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 500]);
      setTimeout(() => arrivedOverlay.classList.remove('show'), 5000);
    }
  }

  // ── GPS ────────────────────────────────────────────────────
  function startGPS() {
    if (!navigator.geolocation) {
      setStatus('GPS tidak disokong oleh peranti ini', 'err');
      return;
    }

    navigator.geolocation.watchPosition(
      pos => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        const acc = Math.round(pos.coords.accuracy);
        gpsEl.innerHTML = `±${acc}<span style="font-size:0.6rem">m</span>`;
        gpsEl.style.color = acc < 20 ? '#00e676' : acc < 50 ? '#ffd600' : '#ff6a00';
        setStatus('SISTEM AKTIF — Ikut anak panah', 'ok');
        updateUI();
      },
      err => {
        setStatus('Gagal mendapat lokasi: ' + err.message, 'err');
        gpsEl.textContent = 'ERR';
      },
      { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
    );
  }

  // ── COMPASS ───────────────────────────────────────────────
  function onHeading(h) {
    hasCompass = true;
    compassHeading = h;
    noCompass.style.display = 'none';
    updateUI();
  }

  // Kaedah 1: AbsoluteOrientationSensor (Android Chrome — paling reliable)
  async function tryAbsoluteSensor() {
    if (!('AbsoluteOrientationSensor' in window)) return false;
    try {
      // Request permissions
      const perms = await Promise.all([
        navigator.permissions.query({ name: 'accelerometer' }),
        navigator.permissions.query({ name: 'magnetometer' }),
        navigator.permissions.query({ name: 'gyroscope' })
      ]);
      if (perms.some(p => p.state === 'denied')) return false;

      const sensor = new AbsoluteOrientationSensor({ frequency: 30, referenceFrame: 'screen' });

      sensor.addEventListener('error', () => {});
      sensor.addEventListener('reading', () => {
        // Convert quaternion → heading (yaw)
        const q = sensor.quaternion; // [x, y, z, w]
        const heading = Math.atan2(
          2 * (q[3]*q[2] + q[0]*q[1]),
          1 - 2 * (q[1]*q[1] + q[2]*q[2])
        ) * 180 / Math.PI;
        onHeading((360 - ((heading + 360) % 360)) % 360);
      });

      sensor.start();
      setStatus('Kompas aktif (Sensor API)', 'ok');
      return true;
    } catch(e) {
      return false;
    }
  }

  // Kaedah 2 & 3: DeviceOrientation events
  function tryDeviceOrientation() {
    let gotData = false;

    const handler = (e) => {
      let heading = null;

      // iOS: webkitCompassHeading
      if (typeof e.webkitCompassHeading === 'number') {
        heading = e.webkitCompassHeading;
      }
      // Android absolute: alpha bukan null
      else if (e.alpha !== null && e.alpha !== undefined) {
        heading = (360 - e.alpha) % 360;
      }

      if (heading !== null) {
        gotData = true;
        onHeading(heading);
      }
    };

    // Cuba absolute dulu (lebih tepat)
    window.addEventListener('deviceorientationabsolute', handler, true);
    window.addEventListener('deviceorientation', handler, true);

    // Timeout check
    setTimeout(() => {
      if (!gotData && !hasCompass) {
        noCompass.style.display = 'block';
        setStatus('GPS aktif — kompas tidak tersedia', 'warn');
      }
    }, 4000);
  }

  async function startCompass() {
    // Cuba AbsoluteOrientationSensor dulu
    const sensorOk = await tryAbsoluteSensor();
    // Kalau gagal, fallback ke DeviceOrientation
    if (!sensorOk) tryDeviceOrientation();

    // Timeout global
    setTimeout(() => {
      if (!hasCompass) noCompass.style.display = 'block';
    }, 5000);
  }

  // ── PERMISSIONS (iOS 13+) ──────────────────────────────────
  async function requestPermissions() {
    btnStart.style.display = 'none';
    setStatus('Meminta kebenaran...', 'warn');

    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== 'granted') {
          noCompass.style.display = 'block';
        }
      } catch(e) {
        noCompass.style.display = 'block';
      }
    }

    startCompass();
    startGPS();
  }

  // ── STATUS HELPER ─────────────────────────────────────────
  function setStatus(msg, type='') {
    statusEl.textContent = msg;
    statusEl.className = type;
  }

  // ── INIT ──────────────────────────────────────────────────
  window.addEventListener('load', () => {
    setStatus('SEDIA — Memerlukan kebenaran lokasi', 'warn');

    // iOS requires button tap to request permission
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      btnStart.style.display = 'block';
    } else {
      // Android / desktop: start directly
      startCompass();
      startGPS();
    }
  });
</script>
</body>
</html>
